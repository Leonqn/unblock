<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reroute DNS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; }
.tabs { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; }
.tab { padding: 12px 20px; cursor: pointer; border: none; background: none; color: #888; font-size: 14px; }
.tab.active { color: #e94560; border-bottom: 2px solid #e94560; margin-bottom: -2px; }
.tab:hover { color: #e0e0e0; }
.panel { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.panel.active { display: block; }
h2 { color: #e94560; margin-bottom: 15px; font-size: 18px; }
input[type="text"] { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
button { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
button:hover { background: #c73e54; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #0f3460; font-size: 13px; }
th { color: #e94560; font-weight: 600; }
th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
th.sortable:hover { color: #ff6b8a; }
th.sortable .sort-arrow { margin-left: 4px; opacity: 0.4; font-style: normal; }
th.sortable.sort-asc .sort-arrow,
th.sortable.sort-desc .sort-arrow { opacity: 1; }
.form-row { display: flex; gap: 8px; margin-bottom: 15px; }
.form-row input { flex: 1; }
.result-box { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 15px; margin-top: 10px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: 600; }
.tag-red { background: #5c1a1a; color: #ff6b6b; }
.tag-green { background: #1a3c1a; color: #6bff6b; }
.tag-blue { background: #1a1a5c; color: #6b6bff; }
.count { color: #888; font-size: 13px; margin-left: 10px; }
.empty { color: #555; font-style: italic; padding: 20px 0; }
.ttl-fresh { color: #6bff6b; }
.ttl-mid   { color: #ffd76b; }
.ttl-old   { color: #ff6b6b; }
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" onclick="showTab('routed')">Routed</button>
  <button class="tab" onclick="showTab('lookup')">DNS Lookup</button>
  <button class="tab" onclick="showTab('stats')">Stats</button>
  <button class="tab" onclick="showTab('updates')">Updates</button>
</div>

<div id="routed" class="panel active">
  <h2>Routed IPs <span id="routed-count" class="count"></span></h2>
  <div class="form-row">
    <input type="text" id="routed-filter" placeholder="Filter..." oninput="renderRouted()">
  </div>
  <table>
    <thead>
      <tr>
        <th class="sortable" id="th-ip" onclick="setRoutedSort('ip')">IP <em class="sort-arrow">&#9650;</em></th>
        <th class="sortable" id="th-comment" onclick="setRoutedSort('comment')">Domain <em class="sort-arrow">&#9650;</em></th>
        <th class="sortable" id="th-age" onclick="setRoutedSort('age')">Last Seen <em class="sort-arrow">&#9650;</em></th>
        <th class="sortable" id="th-ttl" onclick="setRoutedSort('ttl')">Expires In <em class="sort-arrow">&#9650;</em></th>
      </tr>
    </thead>
    <tbody id="routed-body"></tbody>
  </table>
  <div id="routed-empty" class="empty" style="display:none">No routed IPs</div>
</div>

<div id="stats" class="panel">
  <h2>DNS Stats <span id="stats-date-label" class="count"></span></h2>
  <div class="form-row">
    <select id="stats-date" onchange="onDateChange()" style="background:#16213e;border:1px solid #0f3460;color:#e0e0e0;padding:8px 12px;border-radius:4px;font-size:14px"></select>
    <input type="text" id="stats-filter" placeholder="Filter by IP..." oninput="renderStats()">
    <button onclick="clearStatsFilter()" title="Clear filter">&#10005;</button>
  </div>
  <table>
    <thead><tr><th>IP</th><th>Device</th><th>Queries</th><th>Top Domain</th></tr></thead>
    <tbody id="stats-body"></tbody>
  </table>
  <div id="stats-empty" class="empty" style="display:none">No stats yet</div>
  <div id="stats-detail" style="display:none">
    <h2 style="margin-top:20px">Details: <span id="stats-detail-ip"></span></h2>
    <div class="form-row" style="margin-top:10px">
      <span style="color:#888;font-size:13px;padding:8px 0">Top N domains:</span>
      <input type="number" id="stats-top-n" value="100" min="1" max="10000" style="width:80px;background:#16213e;border:1px solid #0f3460;color:#e0e0e0;padding:8px;border-radius:4px;font-size:14px" onchange="reloadDetail()">
    </div>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div style="flex:1;min-width:300px">
        <h3 style="color:#e94560;font-size:14px;margin:10px 0">Top Domains</h3>
        <table>
          <thead><tr><th>Domain</th><th>Count</th></tr></thead>
          <tbody id="stats-domains-body"></tbody>
        </table>
      </div>
      <div style="flex:1;min-width:300px">
        <h3 style="color:#e94560;font-size:14px;margin:10px 0">Last 10 Requests</h3>
        <table>
          <thead><tr><th>Time</th><th>Domain</th><th>Trace</th></tr></thead>
          <tbody id="stats-recent-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="lookup" class="panel">
  <h2>DNS Lookup</h2>
  <div class="form-row">
    <input type="text" id="lookup-domain" placeholder="example.com" onkeydown="if(event.key==='Enter')doLookup()">
    <button onclick="doLookup()">Resolve</button>
  </div>
  <div id="lookup-result"></div>
</div>

<div id="updates" class="panel">
  <h2>Updates</h2>
  <button id="check-updates-btn" onclick="checkUpdates()">Check for updates</button>
  <div id="updates-status" style="margin-top:15px"></div>
  <div id="updates-list" style="margin-top:15px"></div>
</div>

<script>
let routedData = [];
let routedTtlSecs = null; // null = TTL not configured

// sortKey: 'ip' | 'comment' | 'age' | 'ttl'
// sortDir: 'asc' | 'desc'
let routedSortKey = 'age';
let routedSortDir = 'desc'; // desc = freshest first

// Rendered row order — parallel array to tbody rows, stores last_seen_secs per visible row.
// Used by the ticker to update age/ttl cells without touching the rest of the DOM.
let renderedRows = []; // [{lastSeenSecs, trEl}]

function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// --- Routed ---
async function loadRouted() {
  try {
    const r = await fetch('/api/routed');
    const data = await r.json();
    routedData = data.entries;
    routedTtlSecs = data.route_ttl_secs ?? null;
    renderRouted();
  } catch(e) {}
}

function setRoutedSort(key) {
  if (routedSortKey === key) {
    routedSortDir = routedSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    routedSortKey = key;
    routedSortDir = 'asc';
  }
  updateSortHeaders();
  renderRouted();
}

function updateSortHeaders() {
  const cols = ['ip', 'comment', 'age', 'ttl'];
  const arrowUp = '&#9650;';
  const arrowDown = '&#9660;';
  cols.forEach(col => {
    const th = document.getElementById('th-' + col);
    if (!th) return;
    th.classList.remove('sort-asc', 'sort-desc');
    const arrow = th.querySelector('.sort-arrow');
    if (col === routedSortKey) {
      th.classList.add('sort-' + routedSortDir);
      arrow.innerHTML = routedSortDir === 'asc' ? arrowUp : arrowDown;
    } else {
      arrow.innerHTML = arrowUp;
    }
  });
}

function formatDuration(secs) {
  if (secs < 0) secs = 0;
  if (secs < 60)    return secs + 's';
  if (secs < 3600)  return Math.floor(secs / 60) + 'm';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h';
  return Math.floor(secs / 86400) + 'd';
}

function remainingTtl(lastSeenSecs, nowSecs) {
  if (routedTtlSecs === null || lastSeenSecs === 0) return null;
  return Math.max(0, routedTtlSecs - (nowSecs - lastSeenSecs));
}

function ttlClass(remainingSecs) {
  if (routedTtlSecs === null) return '';
  const ratio = remainingSecs / routedTtlSecs;
  if (ratio <= 0.25) return 'ttl-old';
  if (ratio <= 0.5)  return 'ttl-mid';
  return 'ttl-fresh';
}

/**
 * Full rebuild of tbody. Called on data load, filter change, or sort change.
 * Stores rendered row metadata in `renderedRows` so the ticker can do
 * cheap in-place updates without touching IP/Domain cells.
 */
function renderRouted() {
  const nowSecs = Math.floor(Date.now() / 1000);
  const filter = document.getElementById('routed-filter').value.toLowerCase();

  const filtered = routedData.filter(e =>
    e.ip.includes(filter) || (e.comment && e.comment.toLowerCase().includes(filter))
  );

  filtered.sort((a, b) => {
    let cmp = 0;
    if (routedSortKey === 'ip') {
      const toNum = ip => ip.split('.').reduce((acc, oct) => acc * 256 + parseInt(oct, 10), 0);
      cmp = toNum(a.ip) - toNum(b.ip);
    } else if (routedSortKey === 'comment') {
      cmp = (a.comment || '').localeCompare(b.comment || '');
    } else if (routedSortKey === 'age') {
      cmp = (a.last_seen_secs || 0) - (b.last_seen_secs || 0);
    } else {
      const ra = remainingTtl(a.last_seen_secs || 0, nowSecs) ?? Infinity;
      const rb = remainingTtl(b.last_seen_secs || 0, nowSecs) ?? Infinity;
      cmp = ra - rb;
    }
    return routedSortDir === 'asc' ? cmp : -cmp;
  });

  document.getElementById('routed-count').textContent = '(' + routedData.length + ')';
  const tbody = document.getElementById('routed-body');
  const empty = document.getElementById('routed-empty');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    renderedRows = [];
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Build fragment once — single reflow.
  const fragment = document.createDocumentFragment();
  renderedRows = filtered.map(e => {
    const lastSeen = e.last_seen_secs || 0;
    const ageSecs = lastSeen > 0 ? nowSecs - lastSeen : null;
    const ageText = ageSecs !== null ? formatDuration(ageSecs) + ' ago' : '\u2014';
    const rem = remainingTtl(lastSeen, nowSecs);
    const ttlText = rem !== null ? 'in ' + formatDuration(rem) : '\u2014';
    const ttlCls  = rem !== null ? ttlClass(rem) : '';

    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + esc(e.ip) + '</td>'
      + '<td>' + esc(e.comment || '') + '</td>'
      + '<td class="age-cell">' + esc(ageText) + '</td>'
      + '<td class="ttl-cell ' + ttlCls + '">' + esc(ttlText) + '</td>';
    fragment.appendChild(tr);
    return { lastSeenSecs: lastSeen, trEl: tr };
  });

  tbody.innerHTML = '';
  tbody.appendChild(fragment);
}

/**
 * Ticker: runs every 5s, touches only the two time cells per row.
 * No sort re-run, no DOM reconstruction. O(n) text updates only.
 */
function tickRouted() {
  if (renderedRows.length === 0) return;
  const nowSecs = Math.floor(Date.now() / 1000);
  for (const { lastSeenSecs, trEl } of renderedRows) {
    const ageSecs = lastSeenSecs > 0 ? nowSecs - lastSeenSecs : null;
    const ageText = ageSecs !== null ? formatDuration(ageSecs) + ' ago' : '\u2014';
    const rem = remainingTtl(lastSeenSecs, nowSecs);
    const ttlText = rem !== null ? 'in ' + formatDuration(rem) : '\u2014';
    const ttlCls  = rem !== null ? ttlClass(rem) : '';

    const ageCell = trEl.querySelector('.age-cell');
    const ttlCell = trEl.querySelector('.ttl-cell');
    if (ageCell) ageCell.textContent = ageText;
    if (ttlCell) {
      ttlCell.textContent = ttlText;
      ttlCell.className = 'ttl-cell ' + ttlCls;
    }
  }
}

setInterval(loadRouted, 5000);
setInterval(tickRouted, 5000);
updateSortHeaders();
loadRouted();

// --- Stats ---
let statsData = [];
let statsCurrentDate = '';

async function loadDates() {
  try {
    const r = await fetch('/api/stats/dates');
    const dates = await r.json();
    const select = document.getElementById('stats-date');
    const prev = select.value;
    select.innerHTML = dates.map((d, i) =>
      '<option value="' + esc(d) + '"' + (i === 0 ? ' selected' : '') + '>' + esc(d) + (i === 0 ? ' (today)' : '') + '</option>'
    ).join('');
    if (prev && dates.includes(prev)) select.value = prev;
    statsCurrentDate = select.value;
  } catch(e) {}
}

async function onDateChange() {
  statsCurrentDate = document.getElementById('stats-date').value;
  document.getElementById('stats-detail').style.display = 'none';
  await loadStats();
}

async function loadStats() {
  try {
    let url = '/api/stats';
    if (statsCurrentDate) url += '?date=' + encodeURIComponent(statsCurrentDate);
    const r = await fetch(url);
    statsData = await r.json();
    renderStats();
  } catch(e) {}
}

function renderStats() {
  const filter = document.getElementById('stats-filter').value.toLowerCase();
  const filtered = statsData.filter(e => e.ip.includes(filter));
  const tbody = document.getElementById('stats-body');
  const empty = document.getElementById('stats-empty');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  filtered.sort((a, b) => b.total_queries - a.total_queries);
  tbody.innerHTML = filtered.map(e => {
    const topDomain = e.top_domains.length ? e.top_domains[0][0] : '-';
    return '<tr style="cursor:pointer" onclick="showIpDetail(\'' + esc(e.ip) + '\')">'
      + '<td>' + esc(e.ip) + '</td>'
      + '<td>' + esc(e.device_name || '') + '</td>'
      + '<td>' + e.total_queries + '</td>'
      + '<td>' + esc(topDomain) + '</td>'
      + '</tr>';
  }).join('');
}

let currentDetailIp = '';

function clearStatsFilter() {
  document.getElementById('stats-filter').value = '';
  currentDetailIp = '';
  document.getElementById('stats-detail').style.display = 'none';
  renderStats();
}

async function showIpDetail(ip) {
  currentDetailIp = ip;
  document.getElementById('stats-filter').value = ip;
  renderStats();

  const detail = document.getElementById('stats-detail');
  detail.style.display = 'block';
  document.getElementById('stats-detail-ip').textContent = ip;
  await fetchDetail();
}

function reloadDetail() {
  if (currentDetailIp) fetchDetail();
}

async function fetchDetail() {
  const ip = currentDetailIp;
  const topN = document.getElementById('stats-top-n').value || 100;
  document.getElementById('stats-domains-body').innerHTML = '<tr><td colspan="2">Loading...</td></tr>';

  try {
    let url = '/api/stats?ip=' + encodeURIComponent(ip) + '&top=' + topN;
    if (statsCurrentDate) url += '&date=' + encodeURIComponent(statsCurrentDate);
    const r = await fetch(url);
    const data = await r.json();
    const entry = data.find(e => e.ip === ip);
    if (!entry) return;

    document.getElementById('stats-domains-body').innerHTML = entry.top_domains.map(d =>
      '<tr><td>' + esc(d[0]) + '</td><td>' + d[1] + '</td></tr>'
    ).join('');

    document.getElementById('stats-recent-body').innerHTML = entry.recent.slice().reverse().map(r => {
      const t = new Date(r.timestamp * 1000);
      const time = t.toLocaleTimeString() + ' ' + t.toLocaleDateString();
      return '<tr><td style="white-space:nowrap">' + esc(time) + '</td>'
        + '<td>' + esc(r.domain) + '</td>'
        + '<td><code style="color:#888;font-size:12px">' + esc(r.trace) + '</code></td></tr>';
    }).join('');
  } catch(e) {}
}

loadDates().then(() => loadStats());
setInterval(loadStats, 10000);

// --- DNS Lookup ---
async function doLookup() {
  const domain = document.getElementById('lookup-domain').value.trim();
  if (!domain) return;
  const box_ = document.getElementById('lookup-result');
  box_.innerHTML = '<div class="result-box">Resolving...</div>';
  try {
    const r = await fetch('/api/lookup?domain=' + encodeURIComponent(domain));
    const d = await r.json();
    let html = '<div class="result-box">';
    html += '<p><b>' + esc(d.domain) + '</b></p>';
    html += '<p style="margin-top:8px">IPs: ' + (d.ips.length ? d.ips.map(esc).join(', ') : '<i>none</i>') + '</p>';
    if (d.trace) {
      html += '<p style="margin-top:8px">Trace: <code style="color:#888">' + esc(d.trace) + '</code></p>';
    }
    html += '</div>';
    box_.innerHTML = html;
  } catch(e) {
    box_.innerHTML = '<div class="result-box">Error: ' + esc(e.message) + '</div>';
  }
}

// --- Updates ---
let updateAssets = [];

async function checkUpdates() {
  const btn = document.getElementById('check-updates-btn');
  const status = document.getElementById('updates-status');
  const list = document.getElementById('updates-list');
  btn.disabled = true;
  status.innerHTML = '<span style="color:#888">Checking...</span>';
  list.innerHTML = '';
  updateAssets = [];
  try {
    const r = await fetch('/api/updates/check');
    const data = await r.json();
    if (data.error) {
      status.innerHTML = '<span style="color:#ff6b6b">Error: ' + esc(data.error) + '</span>';
      btn.disabled = false;
      return;
    }
    status.innerHTML = '<span style="color:#6bff6b">Latest release: ' + esc(data.tag_name) + (data.name ? ' &mdash; ' + esc(data.name) : '') + '</span>';
    if (data.assets.length === 0) {
      list.innerHTML = '<div class="empty">No binaries available</div>';
      btn.disabled = false;
      return;
    }
    updateAssets = data.assets;
    list.innerHTML = '<table><thead><tr><th>Binary</th><th>Size</th><th></th></tr></thead><tbody>' +
      data.assets.map((a, i) => {
        const sizeMB = (a.size / 1024 / 1024).toFixed(1);
        return '<tr><td>' + esc(a.name) + '</td><td>' + sizeMB + ' MB</td>' +
          '<td><button onclick="applyUpdate(' + i + ')">Install</button></td></tr>';
      }).join('') +
      '</tbody></table>';
    btn.disabled = false;
  } catch(e) {
    status.innerHTML = '<span style="color:#ff6b6b">Error: ' + esc(e.message) + '</span>';
    btn.disabled = false;
  }
}

async function applyUpdate(index) {
  const asset = updateAssets[index];
  if (!asset) return;
  if (!confirm('Install ' + asset.name + '? The service will restart.')) return;
  const status = document.getElementById('updates-status');
  const list = document.getElementById('updates-list');
  status.innerHTML = '<span style="color:#888">Downloading and installing update...</span>';
  list.innerHTML = '';
  try {
    const r = await fetch('/api/updates/apply', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: asset.browser_download_url})
    });
    const data = await r.json();
    if (data.error) {
      status.innerHTML = '<span style="color:#ff6b6b">Error: ' + esc(data.error) + '</span>';
      return;
    }
    status.innerHTML = '<span style="color:#6bff6b">Update installed! Service is restarting. Page will reload in 5 seconds...</span>';
    setTimeout(() => location.reload(), 5000);
  } catch(e) {
    status.innerHTML = '<span style="color:#ff6b6b">Error: ' + esc(e.message) + '</span>';
  }
}

// --- Helpers ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

</script>
</body>
</html>
