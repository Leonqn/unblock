<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unblock DNS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; }
.tabs { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; }
.tab { padding: 12px 20px; cursor: pointer; border: none; background: none; color: #888; font-size: 14px; }
.tab.active { color: #e94560; border-bottom: 2px solid #e94560; margin-bottom: -2px; }
.tab:hover { color: #e0e0e0; }
.panel { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.panel.active { display: block; }
h2 { color: #e94560; margin-bottom: 15px; font-size: 18px; }
input[type="text"] { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
button { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
button:hover { background: #c73e54; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #0f3460; font-size: 13px; }
th { color: #e94560; font-weight: 600; }
.form-row { display: flex; gap: 8px; margin-bottom: 15px; }
.form-row input { flex: 1; }
.result-box { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 15px; margin-top: 10px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: 600; }
.tag-red { background: #5c1a1a; color: #ff6b6b; }
.tag-green { background: #1a3c1a; color: #6bff6b; }
.tag-blue { background: #1a1a5c; color: #6b6bff; }
.count { color: #888; font-size: 13px; margin-left: 10px; }
.empty { color: #555; font-style: italic; padding: 20px 0; }
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" onclick="showTab('routed')">Routed</button>
  <button class="tab" onclick="showTab('lookup')">DNS Lookup</button>
</div>

<div id="routed" class="panel active">
  <h2>Routed IPs <span id="routed-count" class="count"></span></h2>
  <div class="form-row">
    <input type="text" id="routed-filter" placeholder="Filter..." oninput="renderRouted()">
  </div>
  <table>
    <thead><tr><th>IP</th><th>Domain</th></tr></thead>
    <tbody id="routed-body"></tbody>
  </table>
  <div id="routed-empty" class="empty" style="display:none">No routed IPs</div>
</div>

<div id="lookup" class="panel">
  <h2>DNS Lookup</h2>
  <div class="form-row">
    <input type="text" id="lookup-domain" placeholder="example.com" onkeydown="if(event.key==='Enter')doLookup()">
    <button onclick="doLookup()">Resolve</button>
  </div>
  <div id="lookup-result"></div>
</div>

<script>
let routedData = [];

function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// --- Routed ---
async function loadRouted() {
  try {
    const r = await fetch('/api/routed');
    routedData = await r.json();
    renderRouted();
  } catch(e) {}
}

function renderRouted() {
  const filter = document.getElementById('routed-filter').value.toLowerCase();
  const filtered = routedData.filter(e =>
    e.ip.includes(filter) || (e.comment && e.comment.toLowerCase().includes(filter))
  );
  document.getElementById('routed-count').textContent = '(' + routedData.length + ')';
  const tbody = document.getElementById('routed-body');
  const empty = document.getElementById('routed-empty');
  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = filtered.map(e =>
    '<tr><td>' + esc(e.ip) + '</td><td>' + esc(e.comment || '') + '</td></tr>'
  ).join('');
}

setInterval(loadRouted, 5000);
loadRouted();

// --- DNS Lookup ---
async function doLookup() {
  const domain = document.getElementById('lookup-domain').value.trim();
  if (!domain) return;
  const box_ = document.getElementById('lookup-result');
  box_.innerHTML = '<div class="result-box">Resolving...</div>';
  try {
    const r = await fetch('/api/lookup?domain=' + encodeURIComponent(domain));
    const d = await r.json();
    let html = '<div class="result-box">';
    html += '<p><b>' + esc(d.domain) + '</b></p>';
    html += '<p style="margin-top:8px">IPs: ' + (d.ips.length ? d.ips.map(esc).join(', ') : '<i>none</i>') + '</p>';
    html += '<p style="margin-top:8px">Blacklist (routed): ';
    html += d.blacklisted ? '<span class="tag tag-red">YES</span>' : '<span class="tag tag-green">NO</span>';
    html += '</p>';
    html += '<p style="margin-top:8px">Ads block: ';
    html += d.ads_blocked ? '<span class="tag tag-red">BLOCKED</span>' : '<span class="tag tag-green">OK</span>';
    if (d.ads_rule) html += ' <code style="color:#888">' + esc(d.ads_rule) + '</code>';
    html += '</p></div>';
    box_.innerHTML = html;
  } catch(e) {
    box_.innerHTML = '<div class="result-box">Error: ' + esc(e.message) + '</div>';
  }
}

// --- Helpers ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

</script>
</body>
</html>
